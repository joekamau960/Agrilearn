   async function getAnswer() {
    const lang = document.getElementById('language').value;
    const question = document.getElementById('question').value.trim();
    const responseDiv = document.getElementById('response');

    if (!question) {
        responseDiv.innerHTML = 'Please enter a question.';
        return;
    }

    responseDiv.innerHTML = 'Thinking...';

    try {
        const response = await fetch('/api/ask', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ question, language: lang }),
        });

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        responseDiv.innerHTML = `<strong>Response:</strong> ${data.answer}`;

    } catch (error) {
        console.error('Error fetching answer:', error);
        responseDiv.innerHTML = 'Sorry, something went wrong. Please try again.';
    }
}

    function startVoiceInput() {
  if (!('webkitSpeechRecognition' in window)) {
    alert('Speech recognition is not supported in your browser. Please use Chrome.');
    return;
  }

  const recognition = new webkitSpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;

  const lang = document.getElementById('language').value;
  const langVoices = {
    en: 'en-KE', sw: 'sw-KE', lu: 'en-KE', ka: 'en-KE', ma: 'en-KE', so: 'so-SO',
    em: 'en-KE', gi: 'en-KE', ta: 'en-KE', mi: 'en-KE', ki: 'en-KE', lk: 'en-KE',
    ku: 'en-KE', re: 'en-KE', bu: 'en-KE', th: 'en-KE', bo: 'en-KE', po: 'en-KE',
    il: 'en-KE', sa: 'en-KE', tu: 'en-KE', ga: 'en-KE', or: 'en-KE', ra: 'en-KE', se: 'en-KE'
  };

  recognition.lang = langVoices[lang] || 'en-KE';

  recognition.onstart = () => {
    document.getElementById('question').placeholder = "🎙 Listening... Speak now";
  };

  recognition.onresult = function(event) {
    const transcript = event.results[0][0].transcript;
    document.getElementById('question').value = transcript;
    document.getElementById('question').placeholder = "e.g. jinsi ya kupanda mahindi";
    getAnswer();
  };

  recognition.onerror = function(event) {
    alert('🎤 Speech recognition error: ' + event.error);
    document.getElementById('question').placeholder = "e.g. jinsi ya kupanda mahindi";
  };

  recognition.onend = () => {
    document.getElementById('question').placeholder = "e.g. jinsi ya kupanda mahindi";
  };

  recognition.start();
}
