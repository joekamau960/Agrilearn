function getRealisticMonthlyPrices(crop, county) {
    let countyMultiplier = 1.0;

    if (countyFactors.agricultural.includes(county)) {
        countyMultiplier = 0.85;
    } else if (countyFactors.urban.includes(county)) {
        countyMultiplier = 1.20;
    } else if (countyFactors.remote.includes(county)) {
        countyMultiplier = 1.40;
    }

    const basePrice = basePrices[crop] || basePrices["default"];
    const monthlyTrends = monthlyPriceTrends[crop] || monthlyPriceTrends["default"];
    const prices = [];

    for (let i = 0; i < 12; i++) {
        const fluctuation = 1 + (Math.random() - 0.5) * 0.1;
        let finalPrice = basePrice * countyMultiplier * monthlyTrends[i] * fluctuation;
        prices.push(Math.round(finalPrice));
    }
    return prices;
}

const cropPrices = {};

counties.forEach(county => {
    cropPrices[county] = {};
    crops.forEach(crop => {
        cropPrices[county][crop] = getRealisticMonthlyPrices(crop, county);
    });
});

    document.getElementById("priceForm").addEventListener("submit", async function (event) {
      event.preventDefault();
      const crop = document.getElementById("crop").value;
      const location = document.getElementById("location").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();

      if (!crop || !location) {
        alert("Please select a crop and a county.");
        return;
      }

      const today = new Date();
      const currentMonth = today.getMonth();

      const countyCropPrices = cropPrices[location];
      let message = "";

      if (countyCropPrices && countyCropPrices[crop]) {
        const pricesForYear = countyCropPrices[crop];
        const currentPrice = pricesForYear[currentMonth];

        let monthlyPricesHtml = "<h4>Monthly Prices (KES/kg):</h4><ul style='list-style-type: none; padding: 0;'>";
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        pricesForYear.forEach((price, index) => {
            const isCurrentMonth = index === currentMonth ? "style='font-weight: bold; color: #0056b3;'" : "";
            monthlyPricesHtml += `<li ${isCurrentMonth}>${monthNames[index]}: KES ${price}</li>`;
        });
        monthlyPricesHtml += "</ul>";


        message = `<h3>${crop} in ${location}:</h3><p>Current Price (<strong>${monthNames[currentMonth]}</strong>): <strong>KES ${currentPrice} / kg</strong></p>${monthlyPricesHtml}`;


        if (currentPrice > (basePrices[crop] || basePrices["default"]) * 1.1) {
          message += `<p style='color: green'><strong>Good time to sell! Price is currently high.</strong></p>`;
          if (phone) {
            await fetch("http://localhost:3000/send-alert", {
              method: "POST",
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                phone: phone,
                message: `Farm Wisdom: ${crop} price is now KES ${currentPrice} in ${location}. Great time to sell!`
              })
            });
          }
        } else if (currentPrice < (basePrices[crop] || basePrices["default"]) * 0.8) {
          message += `<p style='color: red'><strong>Very low price - avoid selling now.</strong></p>`;
        } else {
          message += `<p style='color: orange'><strong>Consider waiting or storing.</strong></p>`;
        }

        if (email) {
          message += `<p>We’ll notify <strong>${email}</strong> if significant price changes occur!</p>`;
        }
      } else {
        message = `<p>No data found for ${crop} in ${location}. Please ensure both are correctly selected.</p>`;
      }

      document.getElementById("priceResult").innerHTML = message;
    });
  </script>
</body>
</html>
