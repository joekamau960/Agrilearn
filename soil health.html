    document.getElementById("soilForm").addEventListener("submit", function(event) {
      event.preventDefault();

      const type = document.getElementById("soilType").value;
      const color = document.getElementById("color").value.toLowerCase();
      const symptoms = document.getElementById("symptoms").value.toLowerCase();
      const county = document.getElementById("county")?.value;

      let message = "<h3>Soil Analysis Result:</h3><ul>";

      if (type === "clay") {
        message += "<li>Clay soil retains water. Add organic compost to improve drainage.</li>";
      } else if (type === "sandy") {
        message += "<li>Sandy soil drains quickly. Use mulch and compost to retain moisture.</li>";
      } else if (type === "loamy") {
        message += "<li>Loamy soil is ideal. Maintain fertility with compost and rotation.</li>";
      } else if (type === "black") {
        message += "<li>Black cotton soil swells/shrinks. Use raised beds for vegetables.</li>";
      } else if (type === "red") {
        message += "<li>Red volcanic soil is fertile. Avoid erosion on slopes using terracing.</li>";
      }

      if (color.includes("grey") || color.includes("yellow")) {
        message += "<li>Soil color indicates low organic matter. Add compost or manure.</li>";
      }

      if (symptoms.includes("stunted") || symptoms.includes("poor growth")) {
        message += "<li>Possible nitrogen or pH issue. Test pH and apply balanced fertilizer.</li>";
      }
const ph = (Math.random() * 3.5 + 4.5).toFixed(1);
message += `<li><strong>Estimated Soil pH:</strong> ${ph}</li>`;
let mergedCrops = [];

if (countySoilCrops[county]) {
  const { soil, crops: countyCrops } = countySoilCrops[county];
  message += `<li><strong>Soil Type in ${county}:</strong> ${soil}</li>`;
  mergedCrops = mergedCrops.concat(countyCrops);
}

if (crops[type]) {
  mergedCrops = mergedCrops.concat(crops[type]);
}

const uniqueCrops = [...new Set(mergedCrops)];

if (uniqueCrops.length > 0) {
  message += `<li><strong>Recommended Crops:</strong> ${uniqueCrops.join(", ")}</li>`;
}

  message += `<li><strong>Fertilizer Tip:</strong> Add 2-4 tons compost per acre, and apply NPK (20:20:0) based on crop.</li>`;

  if (county && labLinks[county]) {
    message += `<li>Visit your <a href="${labLinks[county]}" target="_blank">local soil lab (${county})</a> for a professional test.</li>`;
  }
  message += "</ul><p>For best results, consider a lab soil test. Contact your local extension officer.</p>";
  document.getElementById("result").innerHTML = message;
  const ctx = document.getElementById('phGraph').getContext('2d');
  ctx.clearRect(0, 0, 400, 80);
  ctx.fillStyle = "#ccc";
  ctx.fillRect(0, 30, 400, 20);
  ctx.fillStyle = "#2C5F2D";
  const x = ((ph - 4.5) / 3.5) * 400;
  ctx.fillRect(0, 30, x, 20);
  ctx.font = "14px Poppins";
  ctx.fillStyle = "#000";
  ctx.fillText(`pH: ${ph}`, x + 5, 45);
    });
</script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    new TomSelect('#county', {
      placeholder: 'Select your county',
      allowEmptyOption: true,
    });
  });
</script>
</body>
</html>
