    };

        furrow: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Furrow_Irrigation_Diagram.svg/1280px-Furrow_Irrigation_Diagram.svg.png"
    };

    document.addEventListener("DOMContentLoaded", function() {
        const cropSelect = document.getElementById("crop");
        const countySelect = document.getElementById("county");
        const stageSelect = document.getElementById("stage");
        const sortedCropNames = Object.keys(cropData).sort();
        sortedCropNames.forEach(cropKey => {
            const option = document.createElement("option");
            option.value = cropKey;
            option.textContent = cropKey.charAt(0).toUpperCase() + cropKey.slice(1);
            cropSelect.appendChild(option);
        });
        const sortedCountyNames = Object.keys(countyToRegionMap).sort();
        sortedCountyNames.forEach(countyKey => {
            const option = document.createElement("option");
            option.value = countyKey;
            option.textContent = countyKey.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
            countySelect.appendChild(option);
        });
        const stages = ["early", "mid", "late"];
        stageSelect.innerHTML = '<option value="">-- Choose Stage --</option>';
        stages.forEach(stageKey => {
            const option = document.createElement("option");
            option.value = stageKey;
            option.textContent = stageKey.charAt(0).toUpperCase() + stageKey.slice(1);
            stageSelect.appendChild(option);
        });

        document.getElementById("irrigationForm").addEventListener("submit", function(event) {
            event.preventDefault();
            const selectedCounty = document.getElementById("county").value.trim().toLowerCase();
            const crop = document.getElementById("crop").value.trim().toLowerCase();
            const stage = document.getElementById("stage").value.trim().toLowerCase();
            const area = parseFloat(document.getElementById("area").value);
            const region = countyToRegionMap[selectedCounty];

            if (!selectedCounty || !crop || !stage || isNaN(area) || area <= 0) {
                alert("Please fill in all fields correctly and ensure area is a positive number.");
                return;
            }
            const cropInfo = cropData[crop];
            const regionFactor = regionClimateFactors[region];
            const stageFactor = cropInfo && cropInfo.stages ? cropInfo.stages[stage] : undefined;

            if (!cropInfo) {
                alert("Crop data not found for the selected crop. Please select another.");
                return;
            }

            if (region === undefined || typeof regionFactor === 'undefined') {
                alert(`Climate data not available for the inferred region '${region}' (derived from '${selectedCounty}'). This is an internal configuration error. Please ensure '${selectedCounty}' is correctly mapped to a valid region and that region has a climate factor. Contact support if the issue persists.`);
                console.error(`Missing region factor for key: '${region}' from county: '${selectedCounty}'`);
                return;
            }

            if (typeof stageFactor === 'undefined') {
                alert("Growth stage data not available for this crop or stage. Please choose another.");
                return;
            }

            const water = (cropInfo.waterPerDay * stageFactor * regionFactor) * area;
            const costPerLiterKES = waterTariffs[region] || waterTariffs["default"];
            const dailyCost = (water * costPerLiterKES).toFixed(2);
            const layout = cropInfo.layout;
            const tip = cropInfo.tip;
            const layoutURL = layoutImages[layout];
            const displayCounty = selectedCounty.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
            const displayRegion = region.replace(/-/g, ' ').split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
            const displayCrop = crop.charAt(0).toUpperCase() + crop.slice(1);
            const displayStage = stage.charAt(0).toUpperCase() + stage.slice(1);


            document.getElementById("result").innerHTML = `
                <h3>Irrigation Plan for ${displayCrop}</h3>
                <p><strong>County:</strong> ${displayCounty}</p>
                <p><strong>Inferred Region:</strong> ${displayRegion}</p>
                <p><strong>Growth Stage:</strong> ${displayStage}</p>
                <p><strong>Recommended System:</strong> ${layout.toUpperCase()}</p>
                <p><strong>Estimated Daily Water Need:</strong> ${water.toFixed(0)} liters (adjusted for ${displayCounty} climate and ${displayStage} stage)</p>
                <p><strong>Estimated Daily Cost:</strong> KES ${dailyCost}</p>
                <p><strong>Irrigation Tip:</strong> ${tip}</p>
                <p><strong>Sample Layout:</strong></p>
                <img src="${layoutURL}" alt="${layout} layout" class="layout-img">
                <p class="disclaimer">Note: Water costs are estimates and can vary based on your specific water provider's tariffs and consumption tiers. Consult your local water bill for actual rates.</p>
            `;
        });

        window.toggleMenu = function() {
            document.getElementById('sideMenu').classList.toggle('open');
        };

        const isLoggedIn = localStorage.getItem("isAuthenticated");
        if (!isLoggedIn) {
            alert("You must be logged in to view this page.");
            window.location.href = "auth.html";
        }
    });
