<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farm Wisdom - Weather Forecast</title>
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    :root {
      --primary-color: #2C5F2D;
      --bg-light: #EEF6F9;
      --card-bg: #FFFFFF;
      --box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      --border-radius: 12px;
    }
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background-color: var(--bg-light);
      color: #333;
    }
    .menu-toggle-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      font-size: 24px;
      cursor: pointer;
      background-color: #d1ecf1;
      padding: 6px 12px;
      border: 2px solid #347ea7;
      border-radius: 6px;
      z-index: 1001;
    }
    .side-menu {
      position: fixed;
      top: 0;
      left: -200px;
      width: 180px;
      height: 100%;
      background-color: #cdeefd;
      box-shadow: 2px 0 6px rgba(0, 0, 0, 0.2);
      padding: 20px 10px;
      transition: left 0.3s ease;
      z-index: 1000;
    }
    .side-menu.open {
      left: 0;
    }
    .side-menu ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .side-menu li {
      margin-bottom: 12px;
    }
    .side-menu a {
      text-decoration: none;
      color: #1b5e75;
      font-weight: bold;
      font-size: 14px;
      padding: 6px 10px;
      display: block;
      border-radius: 6px;
    }
    .side-menu a:hover {
      background-color: #b0e4f5;
    }
    header {
      background-color: var(--primary-color);
      color: white;
      text-align: center;
      padding: 1rem;
      box-shadow: var(--box-shadow);
    }
    main {
      max-width: 960px;
      margin: 20px auto;
      background: var(--card-bg);
      padding: 2rem;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
    }
    h1, h2, h3 {
      color: var(--primary-color);
      text-align: center;
    }
    .form-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
    }
    select, button {
      padding: 10px;
      font-size: 16px;
      min-width: 200px;
    }
    canvas {
      max-width: 100%;
    }
    .forecast-details {
      margin-top: 30px;
      text-align: left;
    }
    footer {
      text-align: center;
      padding: 20px;
      background-color: #f2f2f2;
      color: #555;
    }
  </style>
</head>
<body>
<script src="mode.js"></script>
  <div class="menu-toggle-btn" onclick="toggleMenu()">☰</div>
  <nav class="side-menu" id="sideMenu">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="market price.html">Market</a></li>
      <li><a href="farm budget.html">Budget</a></li>
      <li><a href="farm community forum.html">Community</a></li>
      <li><a href="irrigation planner.html">Irrigation Plan</a></li>
      <li><a href="livestock-calendar.html">Breeding</a></li>
      <li><a href="pest diseases.html">Identifier</a></li>
      <li><a href="profit-calculator.html">Profit Calculator</a></li>
      <li><a href="soil health.html">Soil Health</a></li>
      <li><a href="weather.html" class="active">Weather</a></li>
      <li><a href="agro locator.html">Agro Locator</a></li>
    </ul>
  </nav>

  <header>
    🌾🚜Farm Wisdom🐄🌱 - Weather Pattern Predictor
  </header>

  <main>
    <h2>Weekly Weather Forecast</h2>
    <div class="form-row">
      <select id="county-selector"></select>
      <select id="year-selector">
        <option value="2025">2025</option>
        <option value="2026">2026</option>
      </select>
      <select id="month-selector">
        <option value="0">January</option>
        <option value="1">February</option>
        <option value="2">March</option>
        <option value="3">April</option>
        <option value="4">May</option>
        <option value="5">June</option>
        <option value="6">July</option>
        <option value="7">August</option>
        <option value="8">September</option>
        <option value="9">October</option>
        <option value="10">November</option>
        <option value="11">December</option>
      </select>
      <button onclick="updateForecast()">Show Forecast</button>
    </div>

    <canvas id="forecastChart"></canvas>
    <div class="forecast-details" id="weeklySummary"></div>
    <div id="map"></div>
    <div class="forecast-details" id="geoWeather"></div>
  </main>

  <footer>
    &copy; 2025 Farm Wisdom. All rights reserved. @JoeDevs
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  <script>
    function toggleMenu() {
      document.getElementById('sideMenu').classList.toggle('open');
    }

    window.onload = function () {
      const isLoggedIn = localStorage.getItem("isAuthenticated");
      if (!isLoggedIn) {
        alert("You must be logged in to view this page.");
        window.location.href = "auth.html";
      }
    }
if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const map = L.map('map').setView([lat, lon], 9);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
          L.marker([lat, lon]).addTo(map).bindPopup("You're here!").openPopup();

         fetch(`http://localhost:3000/weather?lat=${lat}&lon=${lon}`)
            .then(res => res.json())
            .then(data => {
              const html = `
                <h3> Your Local Forecast</h3>
                <p><strong>Temperature:</strong> ${data.main.temp_min}°C - ${data.main.temp_max}°C</p>
                <p><strong>Humidity:</strong> ${data.main.humidity}%</p>
                <p><strong>Wind Speed:</strong> ${data.wind.speed} m/s</p>
                <p><strong>Condition:</strong> ${data.weather[0].description}</p>`;
              document.getElementById("geoWeather").innerHTML = html;
            });
        });
      }
    
    const counties = ["Baringo", "Bomet", "Bungoma", "Busia", "Elgeyo-Marakwet", "Embu", "Garissa", "Homa Bay",
      "Isiolo", "Kajiado", "Kakamega", "Kericho", "Kiambu", "Kilifi", "Kirinyaga", "Kisii", "Kisumu",
      "Kitui", "Kwale", "Laikipia", "Lamu", "Machakos", "Makueni", "Mandera", "Marsabit", "Meru",
      "Migori", "Mombasa", "Murang'a", "Nairobi", "Nakuru", "Nandi", "Narok", "Nyamira", "Nyandarua",
      "Nyeri", "Samburu", "Siaya", "Taita Taveta", "Tana River", "Tharaka-Nithi", "Trans Nzoia",
      "Turkana", "Uasin Gishu", "Vihiga", "Wajir", "West Pokot"];

    const weeks = ["Week 1", "Week 2", "Week 3", "Week 4"];
    const weeklyForecasts = {};
    for (let year of [2025, 2026]) {
      weeklyForecasts[year] = {};
      for (let county of counties) {
        weeklyForecasts[year][county] = Array.from({ length: 12 }, (_, monthIndex) => {
          return weeks.map((week, i) => {
            const rainy = Math.floor(Math.random() * 2 + 1);
            const sunny = Math.floor(Math.random() * 2 + 1);
            const cool = 7 - (rainy + sunny);
            return {
              week,
              rainyDays: rainy,
              sunnyDays: sunny,
              coolDays: cool < 0 ? 0 : cool
            };
          });
        });
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      new TomSelect('#county-selector', {
        options: counties.map(c => ({ value: c, text: c })),
        create: false,
        placeholder: "Select a county..."
      });
    });

    function updateForecast() {
      const county = document.getElementById("county-selector").value;
      const year = parseInt(document.getElementById("year-selector").value);
      const month = parseInt(document.getElementById("month-selector").value);
      const ctx = document.getElementById("forecastChart").getContext("2d");
      if (!county || isNaN(month) || isNaN(year)) return;
      const data = weeklyForecasts[year][county][month];

      const rainData = data.map(d => d.rainyDays);
      const sunData = data.map(d => d.sunnyDays);
      const coolData = data.map(d => d.coolDays);

      if (window.chart) window.chart.destroy();

      window.chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: weeks,
          datasets: [
            {
              label: 'Rainy Days',
              data: rainData,
              backgroundColor: 'rgba(54, 162, 235, 0.6)'
            },
            {
              label: 'Sunny Days',
              data: sunData,
              backgroundColor: 'rgba(255, 206, 86, 0.6)'
            },
            {
              label: 'Cool Days',
              data: coolData,
              backgroundColor: 'rgba(153, 102, 255, 0.6)'
            }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            title: {
              display: true,
              text: `Forecast for ${county} - ${document.getElementById("month-selector").selectedOptions[0].text}, ${year}`
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 7,
              title: {
                display: true,
                text: 'Days per Week'
              }
            }
          }
        }
      });

      const summary = `<h3>🗓 Weekly Summary for ${county} - ${document.getElementById("month-selector").selectedOptions[0].text}, ${year}</h3>` +
        data.map((d, i) => `
          <p><strong>${d.week}:</strong> Rainy: ${d.rainyDays} days, Sunny: ${d.sunnyDays} days, Cool: ${d.coolDays} days</p>`
        ).join('');

      document.getElementById("weeklySummary").innerHTML = summary;
    }
  </script>
</body>
</html>
